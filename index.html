<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS DEPANNAGE — Service de Remorquage Premium à Lyon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS VARIABLES & RESET
   ============================================ */
:root {
  --bg-primary: #08111f;
  --bg-secondary: #0d1a2e;
  --bg-card: #101f35;
  --bg-card-hover: #152843;
  --gold: #c9963a;
  --gold-light: #e0b86a;
  --gold-dark: #a07828;
  --text-primary: #f0e8d8;
  --text-secondary: #9aabb8;
  --text-muted: #5a7080;
  --red-banner: #991b1b;
  --border: rgba(201, 150, 58, 0.2);
  --border-strong: rgba(201, 150, 58, 0.5);
  --shadow-gold: 0 0 30px rgba(201, 150, 58, 0.15);
  --font-serif: 'Playfair Display', serif;
  --font-sans: 'DM Sans', sans-serif;
  --nav-height: 80px;
  --banner-height: 48px;
  --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-weight: 400;
  line-height: 1.6;
  overflow-x: hidden;
}

img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }

/* ============================================
   SCROLLBAR CUSTOM
   ============================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

/* ============================================
   TIMER BANNER
   ============================================ */
#timer-banner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: var(--red-banner);
  height: var(--banner-height);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-family: var(--font-sans);
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#timer-banner .banner-icon { font-size: 1rem; animation: pulse-red 1.5s ease-in-out infinite; }
#timer-banner .timer-count {
  font-family: var(--font-sans);
  font-weight: 600;
  color: #fff;
  background: rgba(0,0,0,0.3);
  padding: 2px 10px;
  border-radius: 4px;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
}
#timer-banner .banner-text { color: #fecaca; }

@keyframes pulse-red {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* ============================================
   NAVIGATION
   ============================================ */
#navbar {
  position: fixed;
  top: var(--banner-height);
  left: 0;
  right: 0;
  z-index: 900;
  height: var(--nav-height);
  display: flex;
  align-items: center;
  padding: 0 5%;
  transition: background var(--transition), backdrop-filter var(--transition), box-shadow var(--transition);
}

#navbar.scrolled {
  background: rgba(8, 17, 31, 0.95);
  backdrop-filter: blur(20px);
  box-shadow: 0 2px 30px rgba(0,0,0,0.5);
  border-bottom: 1px solid var(--border);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 1280px;
  margin: 0 auto;
}

.nav-logo {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.nav-logo-main {
  font-family: var(--font-serif);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.08em;
  line-height: 1;
}

.nav-logo-sub {
  font-family: var(--font-sans);
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 3px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 36px;
}

.nav-links a {
  font-family: var(--font-sans);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color var(--transition);
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--gold);
  transition: width var(--transition);
}

.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }

.nav-cta {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--gold);
  color: var(--bg-primary) !important;
  font-weight: 600 !important;
  padding: 10px 22px;
  border-radius: 4px;
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition) !important;
  text-transform: uppercase !important;
}

.nav-cta:hover {
  background: var(--gold-light) !important;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(201, 150, 58, 0.35) !important;
  color: var(--bg-primary) !important;
}

.nav-cta::after { display: none !important; }

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--gold);
  border-radius: 2px;
  transition: var(--transition);
}

/* ============================================
   HERO SECTION
   ============================================ */
#hero {
  min-height: 100vh;
  padding-top: calc(var(--banner-height) + var(--nav-height));
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 60% 40%, rgba(201, 150, 58, 0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 80% at 10% 80%, rgba(13, 26, 46, 0.9) 0%, transparent 60%),
    linear-gradient(160deg, var(--bg-primary) 0%, #0a1828 50%, #0d1a2e 100%);
  z-index: 0;
}

.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201, 150, 58, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201, 150, 58, 0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1280px;
  margin: 0 auto;
  padding: 80px 5%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 60px;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(201, 150, 58, 0.12);
  border: 1px solid var(--border-strong);
  color: var(--gold);
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 7px 16px;
  border-radius: 30px;
  margin-bottom: 28px;
}

.hero-badge-dot {
  width: 6px;
  height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: blink-dot 2s ease-in-out infinite;
}

@keyframes blink-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.hero-title {
  font-family: var(--font-serif);
  font-size: clamp(2.4rem, 4.5vw, 3.8rem);
  font-weight: 700;
  line-height: 1.12;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  margin-bottom: 24px;
}

.hero-title em {
  font-style: italic;
  color: var(--gold);
  display: block;
}

.hero-desc {
  font-family: var(--font-sans);
  font-size: 1rem;
  color: var(--text-secondary);
  line-height: 1.75;
  max-width: 480px;
  margin-bottom: 40px;
}

.hero-ctas {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--gold);
  color: var(--bg-primary);
  font-family: var(--font-sans);
  font-size: 0.88rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 15px 30px;
  border-radius: 4px;
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
  border: 2px solid var(--gold);
}

.btn-primary:hover {
  background: var(--gold-light);
  border-color: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(201, 150, 58, 0.3);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.88rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 15px 30px;
  border-radius: 4px;
  border: 2px solid var(--border-strong);
  transition: border-color var(--transition), color var(--transition), background var(--transition), transform var(--transition);
}

.btn-secondary:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201, 150, 58, 0.06);
  transform: translateY(-2px);
}

/* Hero Stats */
.hero-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 24px;
}

.hero-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  width: 100%;
  max-width: 440px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px 20px;
  text-align: center;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  transform: scaleX(0);
  transition: transform var(--transition);
}

.stat-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-3px);
  box-shadow: var(--shadow-gold);
}

.stat-card:hover::before { transform: scaleX(1); }

.stat-number {
  font-family: var(--font-serif);
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 6px;
}

.stat-label {
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.stat-card.featured {
  grid-column: span 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.stat-stars { color: var(--gold); font-size: 1.1rem; letter-spacing: 3px; }

.hero-emergency {
  background: rgba(153, 27, 27, 0.15);
  border: 1px solid rgba(153, 27, 27, 0.4);
  border-radius: 8px;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  max-width: 440px;
  width: 100%;
}

.hero-emergency-icon { font-size: 1.8rem; }
.hero-emergency-text strong {
  display: block;
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 0.88rem;
  color: #fca5a5;
  margin-bottom: 2px;
}
.hero-emergency-text span {
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* ============================================
   TRUST RIBBON
   ============================================ */
#trust {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 28px 5%;
}

.trust-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(20px, 4vw, 50px);
  flex-wrap: wrap;
}

.trust-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-sans);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}

.trust-check {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  background: rgba(201, 150, 58, 0.15);
  border-radius: 50%;
  color: var(--gold);
  font-size: 0.7rem;
  flex-shrink: 0;
}

.trust-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
}

/* ============================================
   MARQUEE
   ============================================ */
#marquee-section {
  background: var(--bg-primary);
  padding: 20px 0;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
  position: relative;
}

#marquee-section::before,
#marquee-section::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 120px;
  z-index: 2;
}

#marquee-section::before {
  left: 0;
  background: linear-gradient(90deg, var(--bg-primary), transparent);
}

#marquee-section::after {
  right: 0;
  background: linear-gradient(-90deg, var(--bg-primary), transparent);
}

.marquee-track {
  display: flex;
  gap: 0;
  animation: marquee-scroll 35s linear infinite;
  width: max-content;
}

.marquee-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 32px;
  font-family: var(--font-sans);
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  white-space: nowrap;
  border-right: 1px solid var(--border);
}

.marquee-item span.icon { font-size: 1rem; }
.marquee-item span.gold { color: var(--gold); }

@keyframes marquee-scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ============================================
   SERVICES SECTION
   ============================================ */
#services {
  padding: 100px 5%;
  background: var(--bg-primary);
}

.section-header {
  text-align: center;
  max-width: 700px;
  margin: 0 auto 64px;
}

.section-tag {
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
  display: block;
}

.section-title {
  font-family: var(--font-serif);
  font-size: clamp(1.9rem, 3.5vw, 2.8rem);
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
  margin-bottom: 18px;
}

.section-title em {
  font-style: italic;
  color: var(--gold);
}

.section-desc {
  font-family: var(--font-sans);
  font-size: 0.95rem;
  color: var(--text-secondary);
  line-height: 1.7;
}

.services-grid {
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}

.service-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 40px 36px;
  position: relative;
  overflow: hidden;
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
  cursor: default;
}

.service-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
  transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.service-card:hover {
  transform: translateY(-5px);
  border-color: var(--border-strong);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), var(--shadow-gold);
  background: var(--bg-card-hover);
}

.service-card:hover::before { width: 100%; }

.service-number {
  font-family: var(--font-serif);
  font-size: 3.5rem;
  font-weight: 900;
  color: rgba(201, 150, 58, 0.08);
  line-height: 1;
  position: absolute;
  top: 20px;
  right: 28px;
  transition: color var(--transition);
}

.service-card:hover .service-number { color: rgba(201, 150, 58, 0.14); }

.service-icon {
  font-size: 2.4rem;
  margin-bottom: 20px;
  display: block;
}

.service-title {
  font-family: var(--font-serif);
  font-size: 1.28rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  line-height: 1.3;
}

.service-desc {
  font-family: var(--font-sans);
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 20px;
}

.service-features {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.service-feature {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-sans);
  font-size: 0.78rem;
  color: var(--text-muted);
}

.service-feature::before {
  content: '→';
  color: var(--gold);
  font-size: 0.7rem;
}

/* ============================================
   TESTIMONIALS
   ============================================ */
#testimonials {
  padding: 100px 5%;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.testimonials-grid {
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.testimonial-card {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 36px 30px;
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
  position: relative;
}

.testimonial-card::before {
  content: '"';
  position: absolute;
  top: 20px;
  right: 24px;
  font-family: var(--font-serif);
  font-size: 5rem;
  color: rgba(201, 150, 58, 0.08);
  line-height: 1;
}

.testimonial-card:hover {
  transform: translateY(-4px);
  border-color: var(--border-strong);
  box-shadow: 0 16px 40px rgba(0,0,0,0.35), var(--shadow-gold);
}

.testimonial-stars {
  color: var(--gold);
  font-size: 0.85rem;
  letter-spacing: 3px;
  margin-bottom: 16px;
}

.testimonial-text {
  font-family: var(--font-serif);
  font-size: 0.98rem;
  font-style: italic;
  color: var(--text-primary);
  line-height: 1.7;
  margin-bottom: 24px;
}

.testimonial-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.testimonial-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 1rem;
  color: var(--bg-primary);
  flex-shrink: 0;
}

.testimonial-name {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 0.88rem;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.testimonial-role {
  font-family: var(--font-sans);
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* ============================================
   CTA SECTION
   ============================================ */
#cta-final {
  padding: 100px 5%;
  background: var(--bg-primary);
  position: relative;
  overflow: hidden;
}

#cta-final::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(201, 150, 58, 0.06) 0%, transparent 70%);
  pointer-events: none;
}

.cta-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  position: relative;
  z-index: 1;
}

.cta-left .section-title { text-align: left; }
.cta-left .section-desc { text-align: left; }

.cta-promises {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 30px;
}

.cta-promise {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-sans);
  font-size: 0.9rem;
  color: var(--text-secondary);
}

.cta-promise-check {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(201, 150, 58, 0.12);
  border: 1px solid var(--border-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
  font-size: 0.7rem;
  flex-shrink: 0;
}

/* Price Box */
.price-box {
  background: var(--bg-card);
  border: 2px solid var(--border-strong);
  border-radius: 12px;
  padding: 44px 38px;
  text-align: center;
  position: relative;
  overflow: hidden;
